version: "3.7"
services:
  redis:
    image: "redis:alpine"
    network_mode: "host"
  backend:
    image: water0641/dudoong-api:2.2.2
    container_name: backend
    env_file:
      - .env
    network_mode: "host"
    environment:
      - TZ=Asia/Seoul
    logging:
      driver: awslogs
      options:
        awslogs-group: "dudoong-prod"
        awslogs-region: "ap-northeast-2"
        awslogs-stream: "backend"
  front:
    image: david0218/dudoong-ticket:1.3.1
    container_name: front
    network_mode: "host"
    environment:
      - TZ=Asia/Seoul
    logging:
      driver: awslogs
      options:
        awslogs-group: "dudoong-prod"
        awslogs-region: "ap-northeast-2"
        awslogs-stream: "front"
  admin:
    image: david0218/dudoong-admin:1.1.2
    container_name: admin
    network_mode: "host"
    environment:
      - TZ=Asia/Seoul
  internal-admin:
    image: water0641/dudoong-internal-admin:0.5.0
    container_name: internal-admin
    network_mode: "host"
    environment:
      - TZ=Asia/Seoul
    logging:
      driver: awslogs
      options:
        awslogs-group: "dudoong-prod"
        awslogs-region: "ap-northeast-2"
        awslogs-stream: "internal-admin"
  nginx:
    network_mode: "host"
    depends_on:
      - backend
      - front
      - admin
      - internal-admin
    restart: always
    image: water0641/dudoong-nginx:1.7.0
    environment:
      - TZ=Asia/Seoul
    logging:
      driver: awslogs
      options:
        awslogs-group: "dudoong-prod"
        awslogs-region: "ap-northeast-2"
        awslogs-stream: "nginx"
